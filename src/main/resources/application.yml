server:
  port: 8080

spring:
  application.name: Chlora
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

mqtt:
  config:
    broker-url: ${MQTT_BROKER_URL}
    client-id: chlora-sub
    username: ${MQTT_USER}
    password: ${MQTT_PASSWORD}
  subscriber:
    topic: chlora/+/sensors
    qos: 1

security:
  jwt:
    secret: ${JWT_SECRET}

telegram:
  config:
    bot-token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}

ml:
  service:
    url: http://chlora-ml:8000

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never